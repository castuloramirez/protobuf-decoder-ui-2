<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Protobuf Decoder (local)</title>
  <style>
    :root { --gap: 12px; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 20px; max-width: 1100px; }
    .row { display: flex; gap: var(--gap); align-items: center; flex-wrap: wrap; }
    textarea { width: 100%; height: 170px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    pre { background: #f6f6f6; padding: 12px; overflow: auto; border-radius: 10px; }
    select, button, input { padding: 8px; }
    button { cursor: pointer; }
    small { color: #666; }
    .card { padding: 14px; border: 1px solid #eee; border-radius: 14px; margin-top: 14px; }
    .muted { color: #666; }
    .grow { flex: 1; min-width: 260px; }
  </style>
</head>
<body>
<h2>Protobuf Decoder (local)</h2>
<div class="muted">Paste Base64 → choose message type → decode with descriptors → get readable JSON / text.</div>

<div class="card">
  <div class="row">
    <div class="grow">
      <label><b>Message type</b></label><br/>
      <input id="filter" placeholder="Filter types…" style="width:100%" oninput="renderTypes()" />
    </div>
    <div class="grow">
      <label><b>Type</b></label><br/>
      <select id="types" style="width:100%"></select>
    </div>
    <div>
      <label><b>Mode</b></label><br/>
      <select id="mode">
        <option>AUTO</option>
        <option>RAW</option>
        <option>GRPC</option>
        <option>DELIMITED_VARINT</option>
      </select>
    </div>
    <div>
      <label><b>Output</b></label><br/>
      <select id="format">
        <option>JSON</option>
        <option>TEXT</option>
      </select>
    </div>
    <div>
      <label>&nbsp;</label><br/>
      <button onclick="decode()">Decode</button>
    </div>
  </div>

  <h3>Base64 payload</h3>
  <textarea id="payload" placeholder="Paste base64 protobuf message here..."></textarea>
  <div class="row">
    <small class="muted">Tip: whitespace is ignored. AUTO tries RAW → GRPC → DELIMITED_VARINT.</small>
    <div style="margin-left:auto"></div>
    <button onclick="copyOut()">Copy output</button>
    <button onclick="clearAll()">Clear</button>
  </div>
</div>

<div class="card">
  <div class="row">
    <div><b>Decoded</b></div>
    <div class="muted" id="meta"></div>
  </div>
  <pre id="out"></pre>
</div>

<script>
let ALL_TYPES = [];

async function loadTypes() {
  const res = await fetch('/api/types');
  ALL_TYPES = await res.json();
  renderTypes();
}

function renderTypes() {
  const filter = (document.getElementById('filter').value || '').toLowerCase();
  const sel = document.getElementById('types');
  const current = sel.value;

  const filtered = ALL_TYPES.filter(t => t.toLowerCase().includes(filter));
  sel.innerHTML = '';
  for (const t of filtered) {
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = t;
    sel.appendChild(opt);
  }

  // restore selection if still present
  if (current && filtered.includes(current)) {
    sel.value = current;
  }
}

async function decode() {
  const type = document.getElementById('types').value;
  const base64 = document.getElementById('payload').value;
  const mode = document.getElementById('mode').value;
  const format = document.getElementById('format').value;

  const out = document.getElementById('out');
  const meta = document.getElementById('meta');

  out.textContent = 'Decoding...';
  meta.textContent = '';

  try {
    const res = await fetch('/api/decode', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({type, base64, mode, format})
    });

    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.message || JSON.stringify(data));
    }

    out.textContent = data.decoded ?? JSON.stringify(data, null, 2);
    meta.textContent = `modeUsed=${data.modeUsed}, bytes=${data.messageByteLength}`;
  } catch (e) {
    out.textContent = 'Error: ' + (e?.message || e);
  }
}

function copyOut() {
  const text = document.getElementById('out').textContent || '';
  navigator.clipboard.writeText(text);
}

function clearAll() {
  document.getElementById('payload').value = '';
  document.getElementById('out').textContent = '';
  document.getElementById('meta').textContent = '';
}

loadTypes();
</script>
</body>
</html>
